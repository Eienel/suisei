<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E1A" />
    <title>BlockBuilders — learn crypto by building a town</title>
    <meta name="description" content="Read a lesson, answer questions, drop Tetris pieces on a 3D map. Your finished town lives onchain via Sui." />
    <meta property="og:title" content="BlockBuilders" />
    <meta property="og:description" content="Learn crypto by building a town. Onchain on Sui." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BlockBuilders" />
    <meta name="twitter:description" content="Learn crypto by building a town. Onchain on Sui." />
    <style>
      html, body {
        background: #0A0E1A;
        color: #F5F7FF;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Bare static fallback rendered inside #root. React replaces it on mount. */
      #bb-fallback {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; box-sizing: border-box;
        background: #0A0E1A;
        z-index: 0;
      }
      #bb-fallback .card {
        max-width: 380px; width: 100%;
        text-align: left;
      }
      #bb-fallback .brand {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px;
      }
      #bb-fallback .swatch {
        width: 14px; height: 14px;
        background: linear-gradient(135deg, #00E5FF, #8B5CF6);
        border-radius: 3px;
        box-shadow: 0 0 18px rgba(0,229,255,0.55);
      }
      #bb-fallback h1 {
        font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em;
        color: #F5F7FF;
      }
      #bb-fallback .status {
        display: flex; align-items: center; gap: 10px;
        color: #B7BFD5; font-size: 14px;
        margin-bottom: 18px;
      }
      #bb-fallback .dot {
        width: 8px; height: 8px; border-radius: 999px;
        background: #00E5FF;
        animation: bb-pulse 1.3s ease-in-out infinite;
      }
      @keyframes bb-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50%      { opacity: 1; transform: scale(1.6); }
      }
      #bb-troubleshoot {
        display: none;
        border-top: 1px solid #1F2638;
        padding-top: 16px;
        animation: bb-fade 320ms ease both;
      }
      @keyframes bb-fade {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      #bb-troubleshoot p {
        font-size: 13px; color: #B7BFD5; line-height: 1.55;
        margin: 0 0 8px;
      }
      #bb-troubleshoot ol {
        font-size: 13px; color: #B7BFD5; line-height: 1.6;
        padding-left: 18px; margin: 0 0 14px;
      }
      #bb-troubleshoot button, #bb-troubleshoot a {
        display: inline-block;
        background: #F5F7FF; color: #0A0E1A;
        border: 0; border-radius: 8px; padding: 9px 14px;
        font-weight: 600; font-size: 13px; cursor: pointer;
        text-decoration: none; margin-right: 8px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This fallback paints immediately so even if JS fails, the user
           sees BlockBuilders branding and (after a bit) troubleshooting
           tips. React.createRoot replaces this whole tree on mount. -->
      <div id="bb-fallback">
        <div class="card">
          <div class="brand">
            <span class="swatch"></span>
            <h1>BlockBuilders</h1>
          </div>
          <div class="status">
            <span class="dot"></span>
            <span id="bb-status-text">loading…</span>
          </div>
          <div id="bb-troubleshoot">
            <p>The app didn't load. Usually a stale cached file from an old version. Try this first:</p>
            <ol>
              <li><strong>Clear cache &amp; retry</strong> wipes saved progress on this device and reloads with the latest version</li>
              <li>If that doesn't work: open in a private/incognito tab</li>
              <li>Or try a different browser</li>
            </ol>
            <button id="bb-clear-btn">Clear cache &amp; retry</button>
            <button id="bb-retry-btn">Plain retry</button>
          </div>
        </div>
      </div>
    </div>
    <noscript>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:#0A0E1A;color:#F5F7FF;font-family:sans-serif;text-align:center;">
        BlockBuilders needs JavaScript turned on.
      </div>
    </noscript>
    <script>
      // Two failure modes to defend against:
      //   1. Stale index.html cached by the browser points to deleted
      //      asset hashes → JS 404 → React never mounts. We surface a
      //      "Clear cache & retry" button that wipes storage + hard reloads.
      //   2. Corrupted persisted state (incompatible schema after deploy)
      //      throws during React mount. We auto-clear once with a sentinel
      //      so we don't infinite-loop.
      (function () {
        var ATTEMPTED_KEY = 'bb-auto-cleared-once';

        // If a previous attempt detected a crash and cleared storage,
        // also clear the sentinel after a clean mount so subsequent
        // breakage triggers another auto-recovery.
        setTimeout(function () {
          if (!document.getElementById('bb-fallback')) {
            try { sessionStorage.removeItem(ATTEMPTED_KEY); } catch (_) {}
          }
        }, 4000);

        // If React still hasn't mounted after 7s, show troubleshoot
        // card and (if first crash this session) auto-trigger a clean
        // reload one time.
        setTimeout(function () {
          var fallback = document.getElementById('bb-fallback');
          if (!fallback) return;
          var statusText = document.getElementById('bb-status-text');
          if (statusText) statusText.textContent = "couldn't load";
          var ts = document.getElementById('bb-troubleshoot');
          if (ts) ts.style.display = 'block';
          // First crash → quietly auto-recover
          var attempted = false;
          try { attempted = sessionStorage.getItem(ATTEMPTED_KEY) === '1'; } catch (_) {}
          if (!attempted) {
            try { sessionStorage.setItem(ATTEMPTED_KEY, '1'); } catch (_) {}
            try {
              // Wipe persisted Zustand stores (in case schema mismatch crashed React)
              var keys = ['blockbuilders-app', 'blockbuilders-world', 'blockbuilders-custom-lessons'];
              for (var i = 0; i < keys.length; i++) localStorage.removeItem(keys[i]);
            } catch (_) {}
            // Cache-bust the URL so stale index.html / JS gets revalidated
            location.replace(location.pathname + '?_=' + Date.now());
          }
        }, 7000);

        function wipeAndReload(hard) {
          try { localStorage.clear(); } catch (_) {}
          try { sessionStorage.clear(); } catch (_) {}
          try {
            if ('caches' in window) {
              caches.keys().then(function (ks) {
                ks.forEach(function (k) { caches.delete(k); });
              });
            }
          } catch (_) {}
          var url = location.pathname + (hard ? '?_=' + Date.now() : '');
          setTimeout(function () { location.replace(url); }, 60);
        }

        document.addEventListener('click', function (e) {
          var t = e.target;
          if (!t || !t.id) return;
          if (t.id === 'bb-clear-btn') wipeAndReload(true);
          if (t.id === 'bb-retry-btn') location.replace(location.pathname);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
