<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F1ECE2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="Nunito, system-ui, sans-serif" fill="#1A1F2E">
    <text x="80" y="170" font-size="38" font-weight="800" fill="#1E6BFF" letter-spacing="6">BAGS HACKATHON · MVP</text>
    <text x="80" y="290" font-size="120" font-weight="800">think Lego</text>
    <text x="80" y="410" font-size="120" font-weight="800" fill="#1E6BFF">but for crypto.</text>
    <text x="80" y="490" font-size="32" font-weight="600" fill="#3D4555">BlockBuilders · single-player · in your browser</text>
    <g transform="translate(80,540)">
      <rect width="170" height="56" rx="28" fill="#FFC83D" filter="url(#shadow)"/>
      <text x="85" y="38" text-anchor="middle" font-size="28" font-weight="800">$BLOCK</text>
    </g>
  </g>
  <g transform="translate(820, 200)" filter="url(#shadow)">
    <rect width="320" height="220" rx="28" fill="#1E6BFF"/>
    <rect width="320" height="32" rx="28" fill="#5C95FF"/>
    <circle cx="80" cy="-10" r="38" fill="#FFC83D" stroke="#1E6BFF" stroke-width="14"/>
    <circle cx="240" cy="-10" r="38" fill="#FFC83D" stroke="#1E6BFF" stroke-width="14"/>
    <text x="160" y="140" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="800" font-size="44" fill="#FFFFFF" letter-spacing="10">BLOCK</text>
  </g>
