<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:     '#0A0E1A',
          ink2:    '#0E1320',
          ink3:    '#141A2B',
          line:    '#1C2238',
          fg:      '#F5F7FF',
          dim:     '#7B8298',
          blue:    '#1E6BFF',
          bluehi:  '#3D85FF',
          yellow:  '#FFC83D',
          cyan:    '#00E5FF',
        },
        fontFamily: {
          sans: ['Geist', 'ui-sans-serif', 'system-ui'],
          mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
        },
        letterSpacing: {
          tightest2: '-0.045em',
        },
      },
    },
  };
</script>

<style>
  html, body { background: #0A0E1A; color: #F5F7FF; font-family: 'Geist', system-ui, sans-serif; }
  body { -webkit-font-smoothing: antialiased; }

  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7B8298;
  }
  .hl-blue { color: #3D85FF; }
  .hl-fg   { color: #F5F7FF; }

  /* Headline rhythm */
  .display {
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 0.94;
  }

  /* Grain on dark */
  .grain::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: screen;
    opacity: 0.4;
  }

  /* Subtle hairline grid for stage panels */
  .stage-grid {
    background-image:
      linear-gradient(to right, rgba(245,247,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(245,247,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Mascot floating */
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(-0.6deg); }
  }
  .bob { animation: bob 5.5s ease-in-out infinite; transform-origin: center; }

  @keyframes bob2 {
    0%, 100% { transform: translateY(-4px); }
    50%      { transform: translateY(6px); }
  }
  .bob2 { animation: bob2 6.8s ease-in-out infinite; }

  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 24px rgba(30,107,255,0.35)); }
    50%      { filter: drop-shadow(0 0 48px rgba(30,107,255,0.6)); }
  }
  .glow { animation: pulseGlow 4s ease-in-out infinite; }

  /* Mascot ground shadow */
  .mascot-shadow {
    position: absolute;
    bottom: 8%;
    left: 50%;
    width: 56%;
    height: 22px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0) 70%);
    filter: blur(4px);
  }

  /* Underline for text links */
  .ulink {
    position: relative; display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .ulink::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: currentColor; opacity: 0.35;
    transition: opacity .2s ease, transform .2s ease;
    transform-origin: left;
  }
  .ulink:hover::after { opacity: 1; }

  /* Marquee ticker */
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-track {
    display: inline-flex; gap: 3rem; padding-right: 3rem;
    animation: tickerScroll 50s linear infinite;
    white-space: nowrap;
  }

  /* Curriculum row */
  .row-hover:hover { background: rgba(30,107,255,0.05); }
  .row-hover:hover .row-arrow { transform: translateX(4px); opacity: 1; }

  /* Block swatch */
  .swatch {
    width: 14px; height: 14px; border-radius: 2px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.18);
  }

  /* Hero stage tinted panel */
  .stage-panel {
    background:
      radial-gradient(60% 50% at 50% 35%, rgba(30,107,255,0.18), transparent 70%),
      linear-gradient(180deg, #0E1320 0%, #0A0E1A 100%);
    border: 1px solid #1C2238;
  }

  /* Fine top divider */
  .hairline { border-color: #1C2238; }

  /* Iso floor for variant C */
  .iso-floor {
    background:
      linear-gradient(135deg, rgba(30,107,255,0.07) 1px, transparent 1px) 0 0/28px 28px,
      linear-gradient(45deg, rgba(30,107,255,0.07) 1px, transparent 1px) 0 0/28px 28px;
  }

  /* Big editorial type clip */
  .clip-edge { mask-image: linear-gradient(180deg, #000 80%, transparent 100%); }

  /* Number squares */
  .num-chip {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    color: #7B8298; letter-spacing: 0.12em;
  }

  /* Status dot */
  .dot { width: 6px; height: 6px; border-radius: 999px; background: #00E5FF; box-shadow: 0 0 12px #00E5FF; }
</style>
