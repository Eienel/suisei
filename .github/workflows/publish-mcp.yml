name: Publish @suisei-mcp/mcp

# Publishes @suisei-mcp/mcp to npm when a tag like
# `mcp-v0.1.2` is pushed, or on manual dispatch. The job builds from
# packages/mcp and publishes with provenance.
#
# Setup once: add an npm automation token as the NPM_TOKEN repo secret
# (Settings -> Secrets and variables -> Actions). The token needs publish
# rights on the @suisei-mcp scope.

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack only, do not publish'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Pack (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm pack

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/mcp-v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
